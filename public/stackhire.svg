<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.0" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#6366f1" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="4" y="4" width="92" height="92" rx="22" ry="22" fill="url(#grad)" filter="url(#shadow)" />
  <rect x="4" y="4" width="92" height="92" rx="22" ry="22" fill="url(#shineGrad)" />

  <!-- Stack of 3 layered cards (representing job listings / stack) -->
  <!-- Bottom card -->
  <rect x="22" y="52" width="56" height="10" rx="4" fill="white" opacity="0.3"/>
  <!-- Middle card -->
  <rect x="19" y="41" width="62" height="13" rx="5" fill="white" opacity="0.5"/>
  <!-- Top card (main) -->
  <rect x="16" y="28" width="68" height="16" rx="6" fill="white" opacity="0.95"/>

  <!-- Code bracket symbol on top card -->
  <!-- Left bracket < -->
  <polyline points="28,33 23,36 28,39" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right bracket > -->
  <polyline points="44,33 49,36 44,39" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Slash / -->
  <line x1="38" y1="32" x2="34" y2="40" stroke="#7c3aed" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Hire checkmark badge at bottom-right -->
  <circle cx="68" cy="62" r="11" fill="#8b5cf6" stroke="white" stroke-width="2.5"/>
  <polyline points="62,62 66,67 74,57" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
